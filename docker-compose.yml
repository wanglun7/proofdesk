services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: proofdesk
      POSTGRES_USER: proofdesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Only exposed internally; not bound to host port

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_DSN: postgresql+asyncpg://proofdesk:${POSTGRES_PASSWORD}@postgres:5432/proofdesk
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/api/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      RERANKER_MODEL: ${RERANKER_MODEL:-qwen3-rerank}
      EMBED_DIM: ${EMBED_DIM:-1024}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      WECOM_KF_TOKEN: ${WECOM_KF_TOKEN}
      WECOM_KF_ENCODING_AES_KEY: ${WECOM_KF_ENCODING_AES_KEY}
      WECOM_KF_RECEIVE_ID: ${WECOM_KF_RECEIVE_ID:-}
      WECOM_KF_SECRET: ${WECOM_KF_SECRET:-}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
    volumes:
      - questionnaire_files:/app/questionnaire_files

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"

volumes:
  pgdata:
  questionnaire_files:
